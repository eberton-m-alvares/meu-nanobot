version: '3.8'

services:
  nanobot:
    container_name: nanobot
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/root/.nanobot
      - ./workspace:/root/workspace
    ports:
      - "18790:18790"
    environment:
      - TZ=America/Sao_Paulo
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - NANOBOT_SERVER_HOST=0.0.0.0
      - NANOBOT_SERVER_PORT=18790
      - NANOBOT_API_KEY=SUA_SENHA_AQUI
      - NANOBOT_API_ENABLED=true
    command: ["gateway"]
  dashboard:
    container_name: nanobot_dashboard
    image: python:3.11-slim
    restart: unless-stopped
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    ports:
      - "0.0.0.0:8501:8501"
    command: >
      bash -c "pip install streamlit docker psutil && 
      streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0 --theme.base=dark"
    depends_on:
      - nanobot
    environment:
          - DASHBOARD_USER=seu_usuario_admin
          - DASHBOARD_PASS=sua_Senha_secreta_123
